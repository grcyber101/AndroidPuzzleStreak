<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PuzzleStreak Receiver</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: #f9fafb;
      font: 24px/1.4 Arial, sans-serif;
    }

    .shell {
      width: min(960px, 92vw);
      text-align: center;
    }

    .title {
      font-size: 48px;
      margin: 0 0 16px;
    }

    .subtitle {
      margin: 0;
      color: #d1d5db;
    }
  </style>
  <script
    type="text/javascript"
    src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js">
  </script>
</head>
<body>
  <cast-media-player style="display:none;"></cast-media-player>
  <main class="shell">
    <h1 class="title" id="title">PuzzleStreak</h1>
    <p class="subtitle" id="subtitle">Receiver booting...</p>
  </main>

  <script type="text/javascript">
    (function () {
      var NAMESPACE = "urn:x-cast:com.gware.puzzlestreak.game";
      var title = document.getElementById("title");
      var subtitle = document.getElementById("subtitle");

      function setSubtitle(message) {
        subtitle.textContent = message;
      }

      window.onerror = function (message) {
        setSubtitle("Receiver error: " + message);
      };

      try {
        if (!window.cast || !cast.framework || !cast.framework.CastReceiverContext) {
          setSubtitle("Cast framework unavailable");
          return;
        }

        var context = cast.framework.CastReceiverContext.getInstance();
        setSubtitle("Receiver ready. Waiting for game state...");

        context.addCustomMessageListener(NAMESPACE, function (event) {
          try {
            var state = JSON.parse(event.data);
            title.textContent = state.mode || "PuzzleStreak";
            setSubtitle("Round " + state.roundNumber + " • Streak " + state.currentStreak);
          } catch (error) {
            setSubtitle("State parse failed");
          }
        });

        context.start({
          disableIdleTimeout: true
        });
      } catch (error) {
        setSubtitle("Receiver error: " + (error && error.message ? error.message : "Unknown"));
      }
    }());
  </script>
</body>
</html>
