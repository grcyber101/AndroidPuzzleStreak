<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PuzzleStreak Receiver</title>
  <link rel="stylesheet" href="./styles.css" />
  <script
    type="text/javascript"
    src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js">
  </script>
</head>
<body>
  <cast-media-player style="display:none;"></cast-media-player>
  <div class="screen">
    <main class="round-shell">
      <header class="topbar">
        <div class="title-block">
          <h1 class="app-title">Puzzle Streak</h1>
          <div class="mode-rail">
            <span class="mode-label" id="modeWord">WORD</span>
            <span class="mode-label" id="modeNumber">NUMBER</span>
            <span class="mode-label" id="modeTrivia">TRIVIA</span>
          </div>
          <div class="streak-line" id="streakLine">Current Streak 0 | Best Streak 0</div>
          <div class="status-line" id="statusLine">Connect from the PuzzleStreak Android app.</div>
        </div>
      </header>

      <section class="mode-panel" id="wordsPanel">
        <div class="mode-stage">
          <div class="stage-left">
            <div class="words-grid" id="wordsGrid"></div>
          </div>
          <aside class="stage-right words-support">
            <div class="support-card">
              <div class="support-label">Letter Board</div>
              <div class="words-keyboard" id="wordsKeyboard"></div>
            </div>
          </aside>
        </div>
      </section>

      <section class="mode-panel" id="numbersPanel">
        <div class="mode-stage">
          <div class="stage-left">
            <div class="numbers-board" id="numbersBoard"></div>
          </div>
          <aside class="stage-right numbers-support">
            <div class="support-card numbers-target-card">
              <div class="support-label">Target</div>
              <div class="numbers-target" id="numbersTarget">-</div>
              <div class="support-meta" id="numbersRowsRemaining">Rows left: -</div>
            </div>
            <div class="support-card">
              <div class="support-label">Number Pool</div>
              <div class="numbers-pool" id="numbersPool"></div>
            </div>
          </aside>
        </div>
      </section>

      <section class="mode-panel" id="knowledgePanel">
        <div class="mode-stage">
          <div class="stage-left">
            <div class="knowledge-grid" id="knowledgeGrid"></div>
          </div>
          <aside class="stage-right knowledge-support">
            <div class="support-card">
              <div class="knowledge-category" id="knowledgeCategory">Trivia</div>
              <div class="knowledge-clue" id="knowledgeClue">Waiting for clue...</div>
              <div class="knowledge-progress" id="knowledgeProgress">Clue 1 of 3 | 0 / 0</div>
              <div class="entry-preview" id="entryPreview"></div>
            </div>
          </aside>
        </div>
      </section>

      <div class="receiver-footer" id="receiverFooter">Receiver ready. Waiting for game state...</div>
    </main>
  </div>

  <script type="text/javascript">
    (function () {
      var NAMESPACE = "urn:x-cast:com.gware.puzzlestreak.game";
      var context;
      var WORD_KEYBOARD_ROWS = [
        ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
        ["A", "S", "D", "F", "G", "H", "J", "K", "L"],
        ["Z", "X", "C", "V", "B", "N", "M"]
      ];

      var modeWord = document.getElementById("modeWord");
      var modeNumber = document.getElementById("modeNumber");
      var modeTrivia = document.getElementById("modeTrivia");
      var streakLine = document.getElementById("streakLine");
      var statusLine = document.getElementById("statusLine");
      var receiverFooter = document.getElementById("receiverFooter");

      var wordsPanel = document.getElementById("wordsPanel");
      var wordsGrid = document.getElementById("wordsGrid");
      var wordsKeyboard = document.getElementById("wordsKeyboard");

      var numbersPanel = document.getElementById("numbersPanel");
      var numbersRowsRemaining = document.getElementById("numbersRowsRemaining");
      var numbersTarget = document.getElementById("numbersTarget");
      var numbersPool = document.getElementById("numbersPool");
      var numbersBoard = document.getElementById("numbersBoard");

      var knowledgePanel = document.getElementById("knowledgePanel");
      var knowledgeCategory = document.getElementById("knowledgeCategory");
      var knowledgeClue = document.getElementById("knowledgeClue");
      var knowledgeProgress = document.getElementById("knowledgeProgress");
      var knowledgeGrid = document.getElementById("knowledgeGrid");
      var entryPreview = document.getElementById("entryPreview");

      function setFooter(message) {
        receiverFooter.textContent = message;
      }

      function clearActiveModes() {
        modeWord.className = "mode-label";
        modeNumber.className = "mode-label";
        modeTrivia.className = "mode-label";
        wordsPanel.className = "mode-panel";
        numbersPanel.className = "mode-panel";
        knowledgePanel.className = "mode-panel";
      }

      function setStatusText(state) {
        if (state.mode === "WORDS" && state.words) {
          if (state.words.status === "IN_PROGRESS") {
            statusLine.textContent = "Guesses left: " + state.words.guessesRemaining;
          } else if (state.words.status === "WON") {
            statusLine.textContent = "Word solved";
          } else {
            statusLine.textContent = "Streak ended";
          }
          return;
        }

        if (state.mode === "NUMBERS" && state.numbers) {
          if (state.numbers.status === "IN_PROGRESS") {
            statusLine.textContent = "Numbers round in progress";
          } else if (state.numbers.status === "WON") {
            statusLine.textContent = "Target reached";
          } else {
            statusLine.textContent = "Streak ended";
          }
          return;
        }

        if (state.mode === "KNOWLEDGE" && state.knowledge) {
          if (state.knowledge.status === "IN_PROGRESS") {
            statusLine.textContent = state.knowledge.category;
          } else if (state.knowledge.status === "WON") {
            statusLine.textContent = "Grid cleared";
          } else {
            statusLine.textContent = "Incorrect answer";
          }
          return;
        }

        statusLine.textContent = "Connect from the PuzzleStreak Android app.";
      }

      function renderWords(words) {
        var rows = words.guesses ? words.guesses.slice() : [];
        var currentEntry = words.currentEntry || "";
        var wordLength = words.wordLength || 5;
        var rowIndex;
        var tileIndex;

        wordsPanel.className = "mode-panel visible";
        wordsGrid.innerHTML = "";
        wordsKeyboard.innerHTML = "";

        if (currentEntry) {
          rows.push(currentEntry);
        }

        while (rows.length < 6) {
          rows.push("");
        }

        for (rowIndex = 0; rowIndex < rows.length; rowIndex += 1) {
          var rowEl = document.createElement("div");
          rowEl.className = "word-row";

          for (tileIndex = 0; tileIndex < wordLength; tileIndex += 1) {
            var tileEl = document.createElement("div");
            var letter = rows[rowIndex] && rows[rowIndex][tileIndex] ? rows[rowIndex][tileIndex] : "";
            tileEl.className = "word-tile" + (letter ? " filled" : "");
            tileEl.textContent = letter;
            rowEl.appendChild(tileEl);
          }

          wordsGrid.appendChild(rowEl);
        }

        renderWordKeyboard(words.keyboardStates || {});
      }

      function renderWordKeyboard(keyboardStates) {
        var rowIndex;
        var keyIndex;

        for (rowIndex = 0; rowIndex < WORD_KEYBOARD_ROWS.length; rowIndex += 1) {
          var rowEl = document.createElement("div");
          rowEl.className = "keyboard-row";

          for (keyIndex = 0; keyIndex < WORD_KEYBOARD_ROWS[rowIndex].length; keyIndex += 1) {
            var key = WORD_KEYBOARD_ROWS[rowIndex][keyIndex];
            var keyEl = document.createElement("div");
            var result = keyboardStates[key];
            var className = "keyboard-key";

            if (result === "CORRECT") {
              className += " correct";
            } else if (result === "PRESENT") {
              className += " present";
            } else if (result === "ABSENT") {
              className += " absent";
            }

            keyEl.className = className;
            keyEl.textContent = key;
            rowEl.appendChild(keyEl);
          }

          wordsKeyboard.appendChild(rowEl);
        }
      }

      function renderNumbers(numbers) {
        var rowIndex;

        numbersPanel.className = "mode-panel visible";
        numbersRowsRemaining.textContent = "Rows left: " + numbers.rowsRemaining;
        numbersTarget.textContent = numbers.targetNumber;
        numbersPool.innerHTML = "";
        numbersBoard.innerHTML = "";

        for (rowIndex = 0; rowIndex < numbers.rows.length; rowIndex += 1) {
          var rowEl = document.createElement("div");
          rowEl.className = "number-row";
          appendNumberTile(rowEl, numbers.rows[rowIndex].leftOperand, rowIndex === numbers.activeRowIndex && numbers.rows[rowIndex].phase === "LEFT_NUMBER", !!numbers.rows[rowIndex].leftOperand, false, false, numbers.rows[rowIndex].isSubmitted);
          appendNumberTile(rowEl, numbers.rows[rowIndex].operator, rowIndex === numbers.activeRowIndex && numbers.rows[rowIndex].phase === "OPERATOR", !!numbers.rows[rowIndex].operator, false, false, numbers.rows[rowIndex].isSubmitted);
          appendNumberTile(rowEl, numbers.rows[rowIndex].rightOperand, rowIndex === numbers.activeRowIndex && numbers.rows[rowIndex].phase === "RIGHT_NUMBER", !!numbers.rows[rowIndex].rightOperand, false, false, numbers.rows[rowIndex].isSubmitted);
          appendNumberTile(rowEl, "=", false, true, true, false, true);
          appendNumberTile(rowEl, numbers.rows[rowIndex].result, rowIndex === numbers.activeRowIndex && numbers.rows[rowIndex].phase === "READY_TO_SUBMIT", !!numbers.rows[rowIndex].result, false, true, numbers.rows[rowIndex].isSubmitted);
          numbersBoard.appendChild(rowEl);
        }

        renderNumbersPool(numbers.poolNumbers || []);
      }

      function renderNumbersPool(poolNumbers) {
        var index;

        for (index = 0; index < poolNumbers.length; index += 1) {
          var item = poolNumbers[index];
          var chip = document.createElement("div");
          var className = "number-chip";

          if (item.kind === "GENERATED") {
            className += " generated";
          }
          if (item.isUsed) {
            className += " used";
          }

          chip.className = className;
          chip.textContent = String(item.value);
          numbersPool.appendChild(chip);
        }
      }

      function appendNumberTile(parent, text, isActive, isLocked, isFixed, isResult, isSubmitted) {
        var tile = document.createElement("div");
        var className = "number-tile";

        if (isActive) {
          className += " active";
        }
        if (isLocked) {
          className += " locked";
        }
        if (isFixed) {
          className += " fixed";
        }
        if (isResult) {
          className += " result";
          if (isSubmitted) {
            className += " submitted";
          } else if (text) {
            className += " ready";
          }
        }

        tile.className = className;
        tile.textContent = text || "";
        parent.appendChild(tile);
      }

      function renderKnowledge(knowledge) {
        var activeIndex = typeof knowledge.activeEntryIndex === "number" ? knowledge.activeEntryIndex : 0;
        var clueText = "Waiting for clue...";
        var rowIndex;
        var colIndex;

        knowledgePanel.className = "mode-panel visible";
        knowledgeCategory.textContent = knowledge.category || "Trivia";
        if (knowledge.entries && knowledge.entries[activeIndex]) {
          clueText = knowledge.entries[activeIndex].clue;
        }
        knowledgeClue.textContent = clueText;
        knowledgeProgress.textContent = (knowledge.clueLabel || "Clue") + " | " + (knowledge.entryProgressLabel || "");
        knowledgeGrid.innerHTML = "";
        entryPreview.innerHTML = "";

        for (rowIndex = 0; rowIndex < knowledge.grid.length; rowIndex += 1) {
          var rowEl = document.createElement("div");
          rowEl.className = "knowledge-grid-row";
          for (colIndex = 0; colIndex < knowledge.grid[rowIndex].length; colIndex += 1) {
            rowEl.appendChild(createKnowledgeCell(knowledge.grid[rowIndex][colIndex]));
          }
          knowledgeGrid.appendChild(rowEl);
        }

        for (rowIndex = 0; rowIndex < knowledge.currentEntry.length; rowIndex += 1) {
          var entryTile = document.createElement("div");
          entryTile.className = "entry-tile";
          entryTile.textContent = knowledge.currentEntry[rowIndex] === " " ? "" : knowledge.currentEntry[rowIndex];
          entryPreview.appendChild(entryTile);
        }
      }

      function createKnowledgeCell(cell) {
        var tile = document.createElement("div");
        var className = "grid-cell";

        if (!cell.isBlocked) {
          className += " open";
        }
        if (cell.isActive) {
          className += " active";
        }
        if (cell.isSolved) {
          className += " solved";
        }
        if (cell.isFailed) {
          className += " failed";
        }
        if (cell.isCrossing) {
          className += " crossing";
        }

        tile.className = className;
        tile.textContent = cell.letter || "";
        return tile;
      }

      function renderState(state) {
        clearActiveModes();
        streakLine.textContent = "Current Streak " + state.currentStreak + " | Best Streak " + state.bestStreak;
        setStatusText(state);
        setFooter("Casting live game screen");

        if (state.mode === "WORDS") {
          modeWord.className = "mode-label active";
          if (state.words) {
            renderWords(state.words);
          }
        } else if (state.mode === "NUMBERS") {
          modeNumber.className = "mode-label active";
          if (state.numbers) {
            renderNumbers(state.numbers);
          }
        } else if (state.mode === "KNOWLEDGE") {
          modeTrivia.className = "mode-label active";
          if (state.knowledge) {
            renderKnowledge(state.knowledge);
          }
        }
      }

      window.onerror = function (message) {
        setFooter("Receiver error: " + message);
      };

      try {
        if (!window.cast || !cast.framework || !cast.framework.CastReceiverContext) {
          setFooter("Cast framework unavailable");
          return;
        }

        context = cast.framework.CastReceiverContext.getInstance();
        setFooter("Receiver ready. Waiting for game state...");

        context.addCustomMessageListener(NAMESPACE, function (event) {
          try {
            var state = typeof event.data === "string" ? JSON.parse(event.data) : event.data;
            renderState(state);
          } catch (error) {
            setFooter("State parse failed: " + (error && error.message ? error.message : "Unknown"));
          }
        });

        context.start({
          disableIdleTimeout: true
        });
      } catch (error) {
        setFooter("Receiver error: " + (error && error.message ? error.message : "Unknown"));
      }
    }());
  </script>
</body>
</html>
